<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习大冒险</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  color: #333;
}
.container { max-width: 900px; margin: 0 auto; padding: 20px; }

/* Header */
.header {
  text-align: center;
  padding: 30px 0;
  color: white;
}
.header h1 {
  font-size: 2.5em;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  margin-bottom: 10px;
}
.header p { font-size: 1.1em; opacity: 0.9; }

/* Stats Bar */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 20px 0;
  flex-wrap: wrap;
}
.stat-item {
  background: rgba(255,255,255,0.2);
  padding: 10px 20px;
  border-radius: 20px;
  color: white;
  font-size: 0.95em;
}

/* Navigation */
.nav-tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 20px 0;
}
.nav-tab {
  padding: 12px 24px;
  border: none;
  border-radius: 25px;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  font-size: 1em;
  transition: all 0.3s;
}
.nav-tab:hover { background: rgba(255,255,255,0.3); }
.nav-tab.active { background: white; color: #667eea; }

/* Content Area */
.content {
  background: white;
  border-radius: 20px;
  padding: 30px;
  min-height: 400px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

/* Subject Cards */
.subject-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}
.subject-card {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  border-radius: 15px;
  padding: 25px;
  text-align: center;
  color: white;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}
.subject-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.subject-card.chinese { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
.subject-card.math { background: linear-gradient(135deg, #30cfd0 0%, #330867 100%); }
.subject-card.english { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; }
.subject-icon { font-size: 3em; margin-bottom: 10px; }
.subject-card h3 { font-size: 1.3em; margin-bottom: 5px; }

/* Grade Selector */
.grade-selector {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.grade-btn {
  padding: 8px 16px;
  border: 2px solid #667eea;
  background: white;
  color: #667eea;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s;
}
.grade-btn:hover, .grade-btn.active {
  background: #667eea;
  color: white;
}

/* Quiz Area */
.quiz-container { max-width: 600px; margin: 0 auto; }
.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid #eee;
}
.progress-bar {
  width: 100%;
  height: 8px;
  background: #eee;
  border-radius: 4px;
  margin-bottom: 20px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 4px;
  transition: width 0.3s;
}
.question-box {
  background: #f8f9fa;
  border-radius: 15px;
  padding: 25px;
  margin-bottom: 20px;
}
.question-text {
  font-size: 1.2em;
  margin-bottom: 20px;
  line-height: 1.6;
}
.options-list { display: flex; flex-direction: column; gap: 12px; }
.option-btn {
  padding: 15px 20px;
  border: 2px solid #e0e0e0;
  background: white;
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  font-size: 1em;
  transition: all 0.3s;
}
.option-btn:hover { border-color: #667eea; background: #f0f4ff; }
.option-btn.correct { border-color: #4caf50; background: #e8f5e9; }
.option-btn.wrong { border-color: #f44336; background: #ffebee; }

/* Result Screen */
.result-screen { text-align: center; padding: 40px 20px; }
.result-score { font-size: 4em; color: #667eea; margin: 20px 0; }
.result-message { font-size: 1.2em; color: #666; margin-bottom: 30px; }
.btn-primary {
  padding: 15px 40px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 25px;
  font-size: 1.1em;
  cursor: pointer;
  transition: transform 0.3s;
}
.btn-primary:hover { transform: scale(1.05); }

/* Badge Collection */
.badge-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
}
.badge-item {
  text-align: center;
  padding: 20px;
  background: #f8f9fa;
  border-radius: 15px;
  transition: all 0.3s;
}
.badge-item:hover { transform: scale(1.05); }
.badge-item.locked { opacity: 0.4; }
.badge-icon { font-size: 3em; margin-bottom: 10px; }
.badge-name { font-size: 0.9em; color: #666; }

/* Map View */
.map-container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 20px;
}
.map-node {
  aspect-ratio: 1;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2em;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}
.map-node.completed { background: #4caf50; color: white; }
.map-node.current { background: #ff9800; color: white; animation: pulse 2s infinite; }
.map-node.locked { background: #e0e0e0; color: #999; }
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* Settings */
.settings-section { margin-bottom: 25px; }
.settings-section h3 { margin-bottom: 15px; color: #667eea; }
.setting-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid #eee;
}
.toggle-switch {
  width: 50px;
  height: 26px;
  background: #ccc;
  border-radius: 13px;
  position: relative;
  cursor: pointer;
  transition: background 0.3s;
}
.toggle-switch.active { background: #667eea; }
.toggle-switch::after {
  content: "";
  position: absolute;
  width: 22px;
  height: 22px;
  background: white;
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: left 0.3s;
}
.toggle-switch.active::after { left: 26px; }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.5s ease-out; }

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 1.8em; }
  .subject-grid { grid-template-columns: 1fr; }
  .map-container { grid-template-columns: repeat(2, 1fr); }
  .content { padding: 20px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🚀 学习大冒险</h1>
    <p>探索知识的宇宙，收集智慧徽章！</p>
  </div>
  
  <div class="stats-bar">
    <div class="stat-item">⭐ 等级: <span id="level">1</span></div>
    <div class="stat-item">💎 积分: <span id="points">0</span></div>
    <div class="stat-item">🏆 徽章: <span id="badgeCount">0</span>/10</div>
    <div class="stat-item">📚 已完成: <span id="completed">0</span>题</div>
  </div>
  
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('subjects')">📚 科目选择</button>
    <button class="nav-tab" onclick="showTab('map')">🗺️ 冒险地图</button>
    <button class="nav-tab" onclick="showTab('badges')">🏅 徽章墙</button>
    <button class="nav-tab" onclick="showTab('settings')">⚙️ 设置</button>
  </div>
  
  <div class="content" id="content">
    <!-- Dynamic content -->
  </div>
</div>

 6, "type": "fill", "question": "圆的周长公式是C=______，其中r是半径。", "answer": "2πr", "region": "数学迷宫"}, {"id": 187, "subject": "math", "grade": 6, "type": "choice", "question": "一个圆的半径是3厘米，它的周长约是？", "options": ["9.42厘米", "18.84厘米", "28.26厘米", "56.52厘米"], "answer": 1, "region": "数学迷宫"}, {"id": 188, "subject": "math", "grade": 6, "type": "fill", "question": "圆的面积公式是S=______。", "answer": "πr²|πr*r|πr^2", "region": "数学迷宫"}, {"id": 189, "subject": "math", "grade": 6, "type": "choice", "question": "一个圆的直径是10厘米，它的面积是？", "options": ["31.4平方厘米", "62.8平方厘米", "78.5平方厘米", "314平方厘米"], "answer": 2, "region": "数学迷宫"}, {"id": 190, "subject": "math", "grade": 6, "type": "fill", "question": "比例3:5=______:20中，空白处填______。", "answer": "12", "region": "数学迷宫"}, {"id": 191, "subject": "math", "grade": 6, "type": "choice", "question": "把一个圆柱削成最大的圆锥，削去部分的体积是圆柱体积的？", "options": ["1/3", "2/3", "1/2", "1/4"], "answer": 1, "region": "数学迷宫"}, {"id": 192, "subject": "math", "grade": 6, "type": "fill", "question": "50%等于______（用小数表示）。", "answer": "0.5", "region": "数学迷宫"}, {"id": 193, "subject": "math", "grade": 6, "type": "choice", "question": "下列图形中，对称轴最多的是？", "options": ["等边三角形", "正方形", "圆", "长方形"], "answer": 2, "region": "数学迷宫"}, {"id": 194, "subject": "math", "grade": 6, "type": "fill", "question": "一个数的25%是5，这个数是______。", "answer": "20", "region": "数学迷宫"}, {"id": 195, "subject": "math", "grade": 6, "type": "choice", "question": "甲数是乙数的4/5，乙数与甲数的比是？", "options": ["4:5", "5:4", "1:4", "1:5"], "answer": 1, "region": "数学迷宫"}];

// State
let state = {
  currentTab: 'subjects',
  currentSubject: null,
  currentGrade: 2,
  currentQuestion: 0,
  score: 0,
  answers: [],
  level: 1,
  points: 0,
  badges: [],
  completed: 0,
  soundEnabled: true
};

// Load saved state
const saved = localStorage.getItem('adventureState');
if (saved) {
  const parsed = JSON.parse(saved);
  state = { ...state, ...parsed };
}

function saveState() {
  localStorage.setItem('adventureState', JSON.stringify(state));
}

function updateStats() {
  document.getElementById('level').textContent = state.level;
  document.getElementById('points').textContent = state.points;
  document.getElementById('badgeCount').textContent = state.badges.length;
  document.getElementById('completed').textContent = state.completed;
}

function showTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  
  const content = document.getElementById('content');
  content.innerHTML = '';
  content.className = 'content fade-in';
  
  switch(tab) {
    case 'subjects': renderSubjects(); break;
    case 'map': renderMap(); break;
    case 'badges': renderBadges(); break;
    case 'settings': renderSettings(); break;
  }
  saveState();
}

function renderSubjects() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="grade-selector">
      ${[1,2,3,4,5,6].map(g => 
        `<button class="grade-btn ${g === state.currentGrade ? 'active' : ''}" onclick="setGrade(${g})">${g}年级</button>`
      ).join('')}
    </div>
    <div class="subject-grid">
      <div class="subject-card chinese" onclick="startQuiz('chinese')">
        <div class="subject-icon">📖</div>
        <h3>语文</h3>
        <p>拼音、汉字、阅读</p>
      </div>
      <div class="subject-card math" onclick="startQuiz('math')">
        <div class="subject-icon">🔢</div>
        <h3>数学</h3>
        <p>计算、图形、应用题</p>
      </div>
      <div class="subject-card english" onclick="startQuiz('english')">
        <div class="subject-icon">🔤</div>
        <h3>英语</h3>
        <p>单词、语法、对话</p>
      </div>
    </div>
  `;
}

function setGrade(grade) {
  state.currentGrade = grade;
  renderSubjects();
}

function startQuiz(subject) {
  state.currentSubject = subject;
  state.currentQuestion = 0;
  state.score = 0;
  state.answers = [];
  
  const filtered = QUESTIONS.filter(q => 
    q.subject === subject && q.grade === state.currentGrade
  );
  
  if (filtered.length === 0) {
    document.getElementById('content').innerHTML = `
      <div style="text-align:center; padding:40px;">
        <p style="font-size:1.2em; color:#666;">该年级暂无${subject === 'chinese' ? '语文' : subject === 'math' ? '数学' : '英语'}题目</p>
        <button class="btn-primary" onclick="showTab('subjects')" style="margin-top:20px;">返回科目选择</button>
      </div>
    `;
    return;
  }
  
  state.filteredQuestions = filtered;
  showQuestion();
}

function showQuestion() {
  const q = state.filteredQuestions[state.currentQuestion];
  const total = state.filteredQuestions.length;
  const progress = ((state.currentQuestion + 1) / total * 100).toFixed(0);
  
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="quiz-container">
      <div class="quiz-header">
        <span>题目 ${state.currentQuestion + 1} / ${total}</span>
        <span>${q.subject === 'chinese' ? '语文' : q.subject === 'math' ? '数学' : '英语'}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${progress}%"></div>
      </div>
      <div class="question-box">
        <div class="question-text">${q.question}</div>
        <div class="options-list">
          ${q.options.map((opt, i) => `
            <button class="option-btn" onclick="answerQuestion(${i})">${String.fromCharCode(65 + i)}. ${opt}</button>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function answerQuestion(answer) {
  const q = state.filteredQuestions[state.currentQuestion];
  const correct = answer === q.answer;
  
  if (correct) {
    state.score++;
    state.points += 10;
  }
  state.answers.push({ question: q.id, correct });
  
  // Show feedback
  const buttons = document.querySelectorAll('.option-btn');
  buttons[q.answer].classList.add('correct');
  if (!correct) {
    buttons[answer].classList.add('wrong');
  }
  
  // Disable all buttons
  buttons.forEach(btn => btn.onclick = null);
  
  setTimeout(() => {
    state.currentQuestion++;
    if (state.currentQuestion < state.filteredQuestions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }, 1000);
}

function showResult() {
  const total = state.filteredQuestions.length;
  const percentage = Math.round((state.score / total) * 100);
  state.completed += total;
  
  // Level up check
  const newLevel = Math.floor(state.points / 100) + 1;
  if (newLevel > state.level) {
    state.level = newLevel;
  }
  
  // Badge check
  checkBadges(percentage);
  
  let message = '';
  if (percentage >= 90) message = '🎉 太棒了！你是学习小达人！';
  else if (percentage >= 70) message = '👍 做得不错！继续加油！';
  else if (percentage >= 50) message = '💪 还可以更好，再试一次吧！';
  else message = '📚 别灰心，多练习就会进步的！';
  
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="result-screen">
      <div style="font-size: 5em; margin-bottom: 20px;">${percentage >= 80 ? '🏆' : percentage >= 60 ? '🥈' : '📖'}</div>
      <div class="result-score">${percentage}%</div>
      <div class="result-message">${message}</div>
      <p style="color: #666; margin-bottom: 20px;">答对 ${state.score} / ${total} 题 | 获得 ${state.score * 10} 积分</p>
      <button class="btn-primary" onclick="showTab('subjects')">继续冒险</button>
    </div>
  `;
  
  updateStats();
  saveState();
}

function checkBadges(percentage) {
  const badges = [
    { id: 'first', name: '初次冒险', icon: '🌟', condition: () => state.completed >= 1 },
    { id: 'streak3', name: '三连击', icon: '🔥', condition: () => state.score >= 3 },
    { id: 'perfect', name: '完美通关', icon: '💯', condition: () => percentage === 100 },
    { id: 'master', name: '学科大师', icon: '👑', condition: () => state.points >= 100 },
    { id: 'explorer', name: '探索者', icon: '🗺️', condition: () => state.completed >= 20 },
    { id: 'warrior', name: '学习勇士', icon: '⚔️', condition: () => state.level >= 3 },
    { id: 'collector', name: '收藏家', icon: '🏅', condition: () => state.badges.length >= 5 },
    { id: 'champion', name: '冠军', icon: '🥇', condition: () => state.points >= 500 },
    { id: 'legend', name: '传奇', icon: '🐉', condition: () => state.level >= 10 },
    { id: 'genius', name: '小天才', icon: '🧠', condition: () => percentage === 100 && state.filteredQuestions.length >= 10 }
  ];
  
  badges.forEach(badge => {
    if (!state.badges.includes(badge.id) && badge.condition()) {
      state.badges.push(badge.id);
    }
  });
}

function renderMap() {
  const nodes = [
    { id: 1, name: '拼音村', icon: '🏘️', subject: 'chinese' },
    { id: 2, name: '数字山', icon: '⛰️', subject: 'math' },
    { id: 3, name: '字母岛', icon: '🏝️', subject: 'english' },
    { id: 4, name: '汉字城', icon: '🏯', subject: 'chinese' },
    { id: 5, name: '计算谷', icon: '🧮', subject: 'math' },
    { id: 6, name: '语法林', icon: '🌲', subject: 'english' },
    { id: 7, name: '阅读湖', icon: '🌊', subject: 'chinese' },
    { id: 8, name: '几何峰', icon: '🔺', subject: 'math' },
    { id: 9, name: '对话桥', icon: '🌉', subject: 'english' }
  ];
  
  const content = document.getElementById('content');
  content.innerHTML = `
    <h2 style="text-align:center; margin-bottom:20px; color:#667eea;">🗺️ 冒险地图</h2>
    <div class="map-container">
      ${nodes.map((node, i) => {
        const completed = state.completed > i * 5;
        const current = state.completed >= (i - 1) * 5 && state.completed < i * 5;
        const status = completed ? 'completed' : current ? 'current' : 'locked';
        return `<div class="map-node ${status}" onclick="startMapQuiz('${node.subject}')">${node.icon}</div>`;
      }).join('')}
    </div>
    <p style="text-align:center; margin-top:20px; color:#666;">点击节点开始挑战！</p>
  `;
}

function startMapQuiz(subject) {
  startQuiz(subject);
}

function renderBadges() {
  const allBadges = [
    { id: 'first', name: '初次冒险', icon: '🌟' },
    { id: 'streak3', name: '三连击', icon: '🔥' },
    { id: 'perfect', name: '完美通关', icon: '💯' },
    { id: 'master', name: '学科大师', icon: '👑' },
    { id: 'explorer', name: '探索者', icon: '🗺️' },
    { id: 'warrior', name: '学习勇士', icon: '⚔️' },
    { id: 'collector', name: '收藏家', icon: '🏅' },
    { id: 'champion', name: '冠军', icon: '🥇' },
    { id: 'legend', name: '传奇', icon: '🐉' },
    { id: 'genius', name: '小天才', icon: '🧠' }
  ];
  
  const content = document.getElementById('content');
  content.innerHTML = `
    <h2 style="text-align:center; margin-bottom:20px; color:#667eea;">🏅 徽章墙</h2>
    <div class="badge-grid">
      ${allBadges.map(badge => {
        const unlocked = state.badges.includes(badge.id);
        return `
          <div class="badge-item ${unlocked ? '' : 'locked'}">
            <div class="badge-icon">${badge.icon}</div>
            <div class="badge-name">${badge.name}</div>
            <div style="font-size:0.8em; color:#999; margin-top:5px;">${unlocked ? '已获得' : '未解锁'}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderSettings() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <h2 style="text-align:center; margin-bottom:20px; color:#667eea;">⚙️ 设置</h2>
    <div class="settings-section">
      <h3>游戏设置</h3>
      <div class="setting-item">
        <span>音效</span>
        <div class="toggle-switch ${state.soundEnabled ? 'active' : ''}" onclick="toggleSound()"></div>
      </div>
    </div>
    <div class="settings-section">
      <h3>数据管理</h3>
      <button class="btn-primary" onclick="resetProgress()" style="background: #f44336;">重置进度</button>
    </div>
  `;
}

function toggleSound() {
  state.soundEnabled = !state.soundEnabled;
  renderSettings();
  saveState();
}

function resetProgress() {
  if (confirm('确定要重置所有进度吗？此操作不可恢复！')) {
    state = {
      currentTab: 'subjects',
      currentSubject: null,
      currentGrade: 2,
      currentQuestion: 0,
      score: 0,
      answers: [],
      level: 1,
      points: 0,
      badges: [],
      completed: 0,
      soundEnabled: true
    };
    saveState();
    updateStats();
    showTab('subjects');
  }
}

// Initialize
updateStats();
renderSubjects();
</script>
</body>
</html>
