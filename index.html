<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>趣味练习乐园</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'PingFang SC','Microsoft YaHei',sans-serif; background:linear-gradient(135deg,#f0f4ff 0%,#ffe8ec 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { background:#fff; border-radius:24px; padding:40px; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,.08); max-width:480px; width:94%; }
.emoji { font-size:64px; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
h1 { font-size:2em; margin:12px 0 4px; background:linear-gradient(135deg,#ff6b6b,#ff8e53); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.sub { color:#636e72; margin-bottom:20px; }
.url-box { background:#f8f9ff; border-radius:12px; padding:16px; margin:16px 0; word-break:break-all; }
.url-box code { font-size:1.1em; color:#2d3436; font-weight:700; }
.btn { display:inline-block; padding:14px 32px; border-radius:28px; background:linear-gradient(135deg,#ff6b6b,#ee5a24); color:#fff; text-decoration:none; font-weight:700; font-size:1.1em; margin:12px 4px; box-shadow:0 4px 16px rgba(255,107,107,.3); transition:all .3s; }
.btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,107,107,.4); }
.qr-section { margin:20px 0; }
.qr-section img { border:3px solid #f0f0f0; border-radius:12px; width:180px; height:180px; }
.qr-label { font-size:.8em; color:#636e72; margin-top:8px; }
.tip { font-size:.8em; color:#b2bec3; margin-top:20px; }
.tip b { color:#636e72; }
</style>
</head>
<body>
<div class="card">
  <div class="emoji">🚀</div>
  <h1>趣味练习乐园</h1>
  <p class="sub">小学1-6年级语文+数学趣味练习</p>

  <a class="btn" href="/grade2-daily-practice.html">🎮 开始练习</a>

  <div class="url-box">
    <p style="font-size:.85em;color:#636e72;margin-bottom:6px">📱 其他设备访问地址：</p>
    <code>http://192.168.3.29:8822/grade2-daily-practice.html</code>
  </div>

  <div class="qr-section">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=http://192.168.3.29:8822/grade2-daily-practice.html" alt="扫描二维码访问" onerror="this.style.display='none'">
    <div class="qr-label">📷 手机/平板扫码打开</div>
  </div>

  <div class="tip">
    <b>使用方法：</b><br>
    手机/平板连接到同一WiFi<br>
    浏览器输入上方地址或扫码即可<br>
    （所有设备需在同一局域网）
  </div>
</div>
</body>
</html>
