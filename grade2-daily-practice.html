<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学趣味练习乐园</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #2C3E50;
            --light: #F7F9FC;
        }
        
        body {
              font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
              background-image: url('school-bg.png');
              background-size: contain;
              background-position: center top;
              background-attachment: fixed;
              background-repeat: no-repeat;
              background-color: rgba(245, 245, 250, 0.65);
              background-blend-mode: overlay;
              min-height: 100vh;
              overflow-x: hidden;
          }
        
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }
        
        .header h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .section-title {
            font-size: 1.3em;
            color: var(--dark);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title .icon {
            font-size: 1.5em;
        }
        
        /* Settings Panel */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .setting-item label {
            font-weight: bold;
            color: var(--dark);
            font-size: 0.9em;
        }
        
        select, input[type="number"] {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #ee5a5a);
            color: white;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary), #3dbdb5);
            color: white;
        }
        
        .btn-accent {
            background: linear-gradient(135deg, var(--accent), #ffd93d);
            color: var(--dark);
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Question Card */
        .question-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary);
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .question-number {
            background: var(--primary);
            color: white;
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .question-type {
            font-size: 0.8em;
            color: #666;
            background: white;
            padding: 3px 10px;
            border-radius: 10px;
        }
        
        .question-text {
            font-size: 1.1em;
            color: var(--dark);
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option {
            padding: 12px 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .option:hover {
            border-color: var(--secondary);
            background: #f0f9ff;
        }
        
        .option.selected {
            border-color: var(--secondary);
            background: #e0f7fa;
        }
        
        .option.correct {
            border-color: #4CAF50;
            background: #e8f5e9;
        }
        
        .option.wrong {
            border-color: #f44336;
            background: #ffebee;
        }
        
        .option-letter {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--dark);
            flex-shrink: 0;
        }
        
        .answer-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .answer-input:focus {
            outline: none;
            border-color: var(--secondary);
        }
        
        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #fff3e0;
            border-radius: 10px;
            border-left: 4px solid #ff9800;
            display: none;
        }
        
        .explanation.show {
            display: block;
        }
        
        .explanation-title {
            font-weight: bold;
            color: #e65100;
            margin-bottom: 5px;
        }
        
        /* Progress Bar */
        .progress-container {
            margin-bottom: 20px;
        }
        
        .progress-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border-radius: 5px;
            transition: width 0.5s;
        }
        
        .progress-text {
            text-align: center;
            margin-top: 5px;
            color: #666;
            font-size: 0.9em;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa, #e4e8ec);
            border-radius: 15px;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
        
        /* Rewards */
        .rewards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        
        .reward-badge {
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: bounce 0.5s;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .reward-badge.new {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #333;
        }
        
        /* Timer */
        .timer {
            text-align: center;
            font-size: 1.2em;
            color: var(--dark);
            margin-bottom: 15px;
        }
        
        .timer-value {
            font-weight: bold;
            color: var(--primary);
            font-size: 1.3em;
        }
        
        /* Result Screen */
        .result-screen {
            text-align: center;
            padding: 40px 20px;
        }
        
        .result-emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        .result-title {
            font-size: 1.8em;
            color: var(--dark);
            margin-bottom: 15px;
        }
        
        .result-score {
            font-size: 3em;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
        }
        
        .result-message {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 30px;
        }
        
        /* Hidden */
        .hidden {
            display: none !important;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8em; }
            .stats-grid { grid-template-columns: 1fr; }
            .settings-grid { grid-template-columns: 1fr; }
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 50px; height: 50px;
            border: 5px solid #e0e0e0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px; height: 10px;
            top: -10px;
            animation: confetti-fall 3s linear forwards;
            z-index: 1000;
        }
        
        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🌟 小学趣味练习乐园 🌟</h1>
            <p>每天练习，快乐成长！</p>
        </div>
        
        <!-- Settings Panel -->
        <div class="card" id="settings-panel">
            <div class="section-title">
                <span class="icon">⚙️</span>
                练习设置
            </div>
            <div class="settings-grid">
                <div class="setting-item">
                    <label>年级</label>
                    <select id="grade-select">
                        <option value="1">一年级</option>
                        <option value="2" selected>二年级</option>
                        <option value="3">三年级</option>
                        <option value="4">四年级</option>
                        <option value="5">五年级</option>
                        <option value="6">六年级</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>科目</label>
                    <select id="subject-select">
                        <option value="chinese">语文</option>
                        <option value="math">数学</option>
                        <option value="english">英语</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>题目数量</label>
                    <input type="number" id="question-count" value="10" min="1" max="50">
                </div>
                <div class="setting-item">
                    <label>难度</label>
                    <select id="difficulty-select">
                        <option value="all">全部</option>
                        <option value="1">简单</option>
                        <option value="2">中等</option>
                        <option value="3">困难</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" onclick="startPractice()">
                🚀 开始练习
            </button>
        </div>
        
        <!-- Loading -->
        <div class="card hidden" id="loading-panel">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载题目...</p>
            </div>
        </div>
        
        <!-- Practice Panel -->
        <div class="card hidden" id="practice-panel">
            <div class="timer">
                ⏱️ 用时: <span class="timer-value" id="timer">00:00</span>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
                <div class="progress-text">
                    第 <span id="current-q">1</span> / <span id="total-q">10</span> 题
                </div>
            </div>
            
            <div id="questions-container"></div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-secondary" onclick="submitAnswer()" id="submit-btn">
                    ✅ 提交答案
                </button>
                <button class="btn btn-primary hidden" onclick="nextQuestion()" id="next-btn">
                    下一题 ➡️
                </button>
            </div>
        </div>
        
        <!-- Result Panel -->
        <div class="card hidden" id="result-panel">
            <div class="result-screen">
                <div class="result-emoji" id="result-emoji">🎉</div>
                <div class="result-title" id="result-title">练习完成！</div>
                <div class="result-score" id="result-score">0/0</div>
                <div class="result-message" id="result-message">继续加油！</div>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="correct-count">0</div>
                        <div class="stat-label">正确</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="wrong-count">0</div>
                        <div class="stat-label">错误</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="accuracy">0%</div>
                        <div class="stat-label">正确率</div>
                    </div>
                </div>
                
                <div class="rewards-container" id="rewards"></div>
                
                <div style="margin-top: 30px;">
                    <button class="btn btn-primary" onclick="restartPractice()">
                        🔄 再来一次
                    </button>
                    <button class="btn btn-secondary" onclick="backToSettings()">
                        ⚙️ 更换设置
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Stats Panel -->
        <div class="card" id="stats-panel">
            <div class="section-title">
                <span class="icon">📊</span>
                我的成就
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="total-practices">0</div>
                    <div class="stat-label">练习次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="total-questions">0</div>
                    <div class="stat-label">答题总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="total-correct">0</div>
                    <div class="stat-label">正确数</div>
                </div>
            </div>
            <div class="rewards-container" id="all-rewards"></div>
        </div>
    </div>

        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }
        
        // ==================== PRACTICE LOGIC ====================
        function startPractice() {
            const grade = parseInt(document.getElementById('grade-select').value);
            const subject = document.getElementById('subject-select').value;
            const count = parseInt(document.getElementById('question-count').value);
            const difficulty = document.getElementById('difficulty-select').value;
            
            const questions = QUESTION_DB[grade]?.[subject] || [];
            
            if (questions.length === 0) {
                alert('该年级科目暂无题目，请选择其他组合');
                return;
            }
            
            // Filter by difficulty
            let filtered = questions;
            if (difficulty !== 'all') {
                filtered = questions.filter(q => q.difficulty === parseInt(difficulty));
            }
            
            if (filtered.length === 0) {
                filtered = questions;
            }
            
            // Shuffle and select
            currentQuestions = shuffleArray([...filtered]).slice(0, Math.min(count, filtered.length));
            currentIndex = 0;
            answers = {};
            seconds = 0;
            
            // Show practice panel
            document.getElementById('settings-panel').classList.add('hidden');
            document.getElementById('practice-panel').classList.remove('hidden');
            document.getElementById('total-q').textContent = currentQuestions.length;
            
            // Start timer
            startTimer();
            
            // Show first question
            showQuestion(0);
        }
        
        function showQuestion(index) {
            currentIndex = index;
            const q = currentQuestions[index];
            const container = document.getElementById('questions-container');
            
            document.getElementById('current-q').textContent = index + 1;
            document.getElementById('progress-fill').style.width = 
                ((index + 1) / currentQuestions.length * 100) + '%';
            
            let html = `
                <div class="question-card">
                    <div class="question-header">
                        <div class="question-number">${index + 1}</div>
                        <div class="question-type">${getTypeLabel(q.type)}</div>
                    </div>
                    <div class="question-text">${q.question}</div>
            `;
            
            if (q.type === 'choice') {
                html += '<div class="options">';
                q.options.forEach((opt, i) => {
                    const letter = String.fromCharCode(65 + i);
                    const selected = answers[q.id] === opt ? 'selected' : '';
                    html += `
                        <div class="option ${selected}" onclick="selectOption('${q.id}', '${opt}', this)">
                            <div class="option-letter">${letter}</div>
                            <div>${opt}</div>
                        </div>
                    `;
                });
                html += '</div>';
            } else {
                const value = answers[q.id] || '';
                html += `
                    <input type="text" class="answer-input" id="input-${q.id}" 
                           value="${value}" placeholder="请输入答案..."
                           onchange="saveInput('${q.id}', this.value)">
                `;
            }
            
            html += `
                <div class="explanation" id="exp-${q.id}">
                    <div class="explanation-title">💡 解析</div>
                    <div>${q.explanation}</div>
                </div>
                </div>
            `;
            
            container.innerHTML = html;
            
            // Update buttons
            document.getElementById('submit-btn').classList.remove('hidden');
            document.getElementById('next-btn').classList.add('hidden');
        }
        
        function getTypeLabel(type) {
            const labels = {
                'choice': '选择题',
                'fill_blank': '填空题',
                'true_false': '判断题',
                'matching': '连线题'
            };
            return labels[type] || type;
        }
        
        function selectOption(qid, value, element) {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            answers[qid] = value;
        }
        
        function saveInput(qid, value) {
            answers[qid] = value.trim();
        }
        
        function submitAnswer() {
            const q = currentQuestions[currentIndex];
            const userAnswer = answers[q.id];
            
            if (!userAnswer) {
                alert('请先作答！');
                return;
            }
            
            const isCorrect = checkAnswer(q, userAnswer);
            
            // Show correct/wrong styling
            if (q.type === 'choice') {
                document.querySelectorAll('.option').forEach((opt, i) => {
                    const value = q.options[i];
                    if (value === q.answer) {
                        opt.classList.add('correct');
                    } else if (value === userAnswer && !isCorrect) {
                        opt.classList.add('wrong');
                    }
                });
            }
            
            // Show explanation
            document.getElementById(`exp-${q.id}`).classList.add('show');
            
            // Update buttons
            document.getElementById('submit-btn').classList.add('hidden');
            
            if (currentIndex < currentQuestions.length - 1) {
                document.getElementById('next-btn').classList.remove('hidden');
            } else {
                document.getElementById('next-btn').textContent = '查看结果 🏆';
                document.getElementById('next-btn').onclick = showResults;
                document.getElementById('next-btn').classList.remove('hidden');
            }
            
            answers[q.id + '_correct'] = isCorrect;
        }
        
        function checkAnswer(question, userAnswer) {
            const correct = question.answer.toString().trim();
            const user = userAnswer.toString().trim();
            
            if (user === correct) return true;
            if (user.toLowerCase() === correct.toLowerCase()) return true;
            if (!isNaN(user) && !isNaN(correct)) {
                return parseFloat(user) === parseFloat(correct);
            }
            return false;
        }
        
        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                showQuestion(currentIndex + 1);
            }
        }
        
        // ==================== TIMER ====================
        function startTimer() {
            clearInterval(timer);
            seconds = 0;
            timer = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${mins}:${secs}`;
            }, 1000);
        }
        
        // ==================== RESULTS ====================
        function showResults() {
            clearInterval(timer);
            
            let correct = 0;
            let wrong = 0;
            
            currentQuestions.forEach(q => {
                if (answers[q.id + '_correct']) {
                    correct++;
                } else {
                    wrong++;
                }
            });
            
            const accuracy = Math.round(correct / currentQuestions.length * 100);
            
            // Update stats
            stats.practices++;
            stats.questions += currentQuestions.length;
            stats.correct += correct;
            
            // Check rewards
            const newRewards = checkRewards(correct, currentQuestions.length, accuracy, seconds);
            newRewards.forEach(r => {
                if (!stats.rewards.includes(r.id)) {
                    stats.rewards.push(r.id);
                }
            });
            
            localStorage.setItem('practiceStats', JSON.stringify(stats));
            
            // Show result panel
            document.getElementById('practice-panel').classList.add('hidden');
            document.getElementById('result-panel').classList.remove('hidden');
            
            // Set result content
            const emoji = accuracy >= 90 ? '🏆' : accuracy >= 70 ? '🌟' : accuracy >= 60 ? '👍' : '💪';
            const title = accuracy >= 90 ? '太棒了！' : accuracy >= 70 ? '做得很好！' : accuracy >= 60 ? '继续加油！' : '不要气馁！';
            const message = accuracy >= 90 ? '你是小小天才！' : accuracy >= 70 ? '你已经掌握得很好了！' : accuracy >= 60 ? '再多练习就能更好！' : '只要坚持，一定能进步！';
            
            document.getElementById('result-emoji').textContent = emoji;
            document.getElementById('result-title').textContent = title;
            document.getElementById('result-score').textContent = `${correct}/${currentQuestions.length}`;
            document.getElementById('result-message').textContent = message;
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('wrong-count').textContent = wrong;
            document.getElementById('accuracy').textContent = accuracy + '%';
            
            // Show rewards
            const rewardsContainer = document.getElementById('rewards');
            rewardsContainer.innerHTML = '';
            newRewards.forEach(r => {
                const badge = document.createElement('div');
                badge.className = 'reward-badge new';
                badge.textContent = `${r.icon} ${r.name}`;
                rewardsContainer.appendChild(badge);
            });
            
            if (newRewards.length === 0 && stats.rewards.length > 0) {
                rewardsContainer.innerHTML = '<div style="color: #999;">已获得所有徽章，继续保持！</div>';
            }
            
            // Confetti for good scores
            if (accuracy >= 80) {
                createConfetti();
            }
            
            loadStats();
        }
        
        function checkRewards(correct, total, accuracy, time) {
            const rewards = [];
            const allRewards = [
                { id: 'first_practice', name: '初次尝试', icon: '🌱', condition: () => stats.practices === 1 },
                { id: 'perfect_score', name: '满分达人', icon: '💯', condition: () => correct === total },
                { id: 'fast_learner', name: '速算高手', icon: '⚡', condition: () => time < 60 && correct === total },
                { id: 'accuracy_80', name: '准确率80%', icon: '🎯', condition: () => accuracy >= 80 },
                { id: 'accuracy_90', name: '准确率90%', icon: '🎖️', condition: () => accuracy >= 90 },
                { id: 'accuracy_100', name: '准确率100%', icon: '👑', condition: () => accuracy === 100 },
                { id: 'ten_practices', name: '练习十次', icon: '📚', condition: () => stats.practices >= 10 },
                { id: 'hundred_questions', name: '百题斩', icon: '⚔️', condition: () => stats.questions >= 100 },
                { id: 'persistence', name: '坚持不懈', icon: '🔥', condition: () => stats.practices >= 5 },
            ];
            
            allRewards.forEach(r => {
                if (r.condition() && !stats.rewards.includes(r.id)) {
                    rewards.push(r);
                }
            });
            
            return rewards;
        }
        
        // ==================== STATS ====================
        function loadStats() {
            document.getElementById('total-practices').textContent = stats.practices;
            document.getElementById('total-questions').textContent = stats.questions;
            document.getElementById('total-correct').textContent = stats.correct;
            
            const allRewards = [
                { id: 'first_practice', name: '初次尝试', icon: '🌱' },
                { id: 'perfect_score', name: '满分达人', icon: '💯' },
                { id: 'fast_learner', name: '速算高手', icon: '⚡' },
                { id: 'accuracy_80', name: '准确率80%', icon: '🎯' },
                { id: 'accuracy_90', name: '准确率90%', icon: '🎖️' },
                { id: 'accuracy_100', name: '准确率100%', icon: '👑' },
                { id: 'ten_practices', name: '练习十次', icon: '📚' },
                { id: 'hundred_questions', name: '百题斩', icon: '⚔️' },
                { id: 'persistence', name: '坚持不懈', icon: '🔥' },
            ];
            
            const container = document.getElementById('all-rewards');
            container.innerHTML = '';
            
            allRewards.forEach(r => {
                const earned = stats.rewards.includes(r.id);
                const badge = document.createElement('div');
                badge.className = 'reward-badge';
                badge.style.background = earned ? 'linear-gradient(135deg, #ffd700, #ffed4e)' : '#e0e0e0';
                badge.style.color = earned ? '#333' : '#999';
                badge.textContent = `${r.icon} ${r.name}`;
                container.appendChild(badge);
            });
        }
        
        // ==================== UTILITIES ====================
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        function createConfetti() {
            const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#a8e6cf', '#ff8b94'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }
        }
        
        function restartPractice() {
            document.getElementById('result-panel').classList.add('hidden');
            document.getElementById('practice-panel').classList.remove('hidden');
            currentIndex = 0;
            answers = {};
            seconds = 0;
            startTimer();
            showQuestion(0);
        }
        
        function backToSettings() {
            document.getElementById('result-panel').classList.add('hidden');
            document.getElementById('practice-panel').classList.add('hidden');
            document.getElementById('settings-panel').classList.remove('hidden');
            clearInterval(timer);
        }
        
        // ==================== START ====================
        init();
    </script>
</body>
</html>
