<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌟 小学趣味练习乐园</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --pri: #ff6b6b; --pri2: #ee5a24; --pri-lt: #ffe0e0;
  --bg: #f0f4ff; --bg2: #fff; --card: #fff; --text: #2d3436; --text2: #636e72; --text3: #b2bec3;
  --grn: #6bcb77; --grn-lt: #d4f0d8;
  --blu: #4d96ff; --blu-lt: #dceaff;
  --ylw: #ffd93d; --ylw-lt: #fff5cc;
  --ppl: #9b59b6; --ppl-lt: #f0e0f8;
  --tel: #00b894; --tel-lt: #d0f5ee;
  --shadow: 0 4px 20px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 40px rgba(0,0,0,.1);
  --radius: 16px; --radius-lg: 24px; --radius-sm: 10px;
  --font: 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:var(--font); background:var(--bg); color:var(--text);
  min-height:100vh; overflow-x:hidden; line-height:1.6;
  background-image: radial-gradient(circle at 20% 10%, #e8f0ff 0%, transparent 50%),
                    radial-gradient(circle at 80% 90%, #ffe8ec 0%, transparent 50%),
                    radial-gradient(circle at 50% 50%, #f0f4ff 0%, #e8ecf8 100%);
}
/* Floating decorative shapes */
.bg-shapes { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.bg-shape { position:absolute; border-radius:50%; opacity:.08; animation: floatShape 20s ease-in-out infinite; }
.bg-shape:nth-child(1) { width:300px; height:300px; background:var(--pri); top:5%; left:-5%; animation-delay:0s; }
.bg-shape:nth-child(2) { width:200px; height:200px; background:var(--blu); top:60%; right:-3%; animation-delay:-7s; }
.bg-shape:nth-child(3) { width:250px; height:250px; background:var(--grn); bottom:-5%; left:30%; animation-delay:-14s; }
.bg-shape:nth-child(4) { width:180px; height:180px; background:var(--ylw); top:30%; right:20%; animation-delay:-3s; }
@keyframes floatShape { 0%,100% { transform:translate(0,0) scale(1); } 33% { transform:translate(30px,-40px) scale(1.1); } 66% { transform:translate(-20px,20px) scale(.9); } }

/* ===== Container ===== */
.container { max-width:800px; margin:0 auto; padding:16px; position:relative; z-index:1; }
.screen { display:none; }
.screen.active { display:block; animation: fadeUp .4s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
@keyframes popBounce { 0% { transform:scale(0) rotate(-10deg); } 60% { transform:scale(1.1) rotate(3deg); } 100% { transform:scale(1) rotate(0); } }
@keyframes slideIn { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.04); } }
@keyframes wiggle { 0%,100% { transform:rotate(0); } 20% { transform:rotate(-4deg); } 40%{transform:rotate(4deg);} 60%{transform:rotate(-3deg);} 80%{transform:rotate(2deg);} }
@keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
@keyframes rise { 0% { opacity:1; transform:translateY(0) scale(1); } 100% { opacity:0; transform:translateY(-120px) scale(0); } }
@keyframes confettiDrop { 0% { transform:translateY(-100vh) rotate(0); } 100% { transform:translateY(100vh) rotate(720deg); } }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px)} }
@keyframes glow { 0%,100%{box-shadow:0 0 8px var(--pri);} 50%{box-shadow:0 0 20px var(--pri),0 0 40px var(--pri2);} }
@keyframes countPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }

/* ===== Header ===== */
.app-header { background:linear-gradient(135deg, #ff6b6b, #ff8e53, #ffa502); color:#fff; 
  border-radius:var(--radius-lg); padding:20px 24px; margin-bottom:16px; position:relative; overflow:hidden;
  box-shadow:0 8px 32px rgba(255,107,107,.25); }
.app-header::after { content:''; position:absolute; top:-50%; right:-20%; width:200px; height:200px;
  background:rgba(255,255,255,.1); border-radius:50%; }
.app-header-top { display:flex; align-items:center; gap:12px; position:relative; z-index:1; }
.app-mascot { font-size:48px; animation:float 3s ease-in-out infinite; }
.app-greeting { flex:1; }
.app-greeting h1 { font-size:1.5em; font-weight:800; }
.app-greeting p { font-size:.85em; opacity:.9; }
.app-stats-mini { display:flex; gap:16px; position:relative; z-index:1; margin-top:12px; }
.mini-stat { text-align:center; }
.mini-stat .val { font-size:1.4em; font-weight:800; }
.mini-stat .lbl { font-size:.7em; opacity:.8; }

/* ===== Grade Selector ===== */
.grade-ribbon { display:flex; gap:8px; overflow-x:auto; padding:8px 0; margin-bottom:12px; scrollbar-width:none; }
.grade-ribbon::-webkit-scrollbar { display:none; }
.grade-chip { flex-shrink:0; padding:10px 16px; border-radius:24px; border:2px solid rgba(0,0,0,.06);
  background:var(--bg2); cursor:pointer; font-size:.85em; font-weight:600; transition:all .3s;
  white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,.03); }
.grade-chip:hover { border-color:var(--pri); transform:translateY(-2px); }
.grade-chip.active { background:var(--pri); color:#fff; border-color:var(--pri); box-shadow:0 4px 16px rgba(255,107,107,.3); }
.grade-chip .grade-emoji { margin-right:4px; }

/* ===== Mode Toggle ===== */
.mode-toggle { display:flex; background:var(--bg2); border-radius:var(--radius); padding:4px;
  margin-bottom:16px; box-shadow:var(--shadow); }
.mode-btn { flex:1; padding:12px; border:none; border-radius:12px; cursor:pointer; font-size:.9em;
  font-weight:600; transition:all .3s; background:transparent; color:var(--text2); font-family:var(--font); }
.mode-btn.active { background:var(--pri); color:#fff; box-shadow:0 4px 12px rgba(255,107,107,.3); }
.mode-btn .mode-icon { font-size:1.2em; display:block; margin-bottom:2px; }

/* ===== Cards ===== */
.card { background:var(--bg2); border-radius:var(--radius-lg); padding:20px; margin-bottom:14px;
  box-shadow:var(--shadow); border:1px solid rgba(0,0,0,.04); transition:transform .3s,box-shadow .3s; }
.card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
.card-accent { border-left:4px solid var(--pri); }
.card-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.card-icon { font-size:32px; width:44px; height:44px; border-radius:12px; display:flex; 
  align-items:center; justify-content:center; }
.card-icon.pri { background:var(--pri-lt); } .card-icon.grn { background:var(--grn-lt); }
.card-icon.blu { background:var(--blu-lt); } .card-icon.ppl { background:var(--ppl-lt); }
.card-icon.ylw { background:var(--ylw-lt); }
.card-title { font-weight:700; font-size:1.05em; }
.card-sub { font-size:.8em; color:var(--text2); }

/* Subject cards */
.subject-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.subject-card { background:var(--bg2); border-radius:var(--radius-lg); padding:20px; cursor:pointer;
  text-align:center; border:2px solid transparent; transition:all .3s; box-shadow:var(--shadow);
  position:relative; overflow:hidden; }
.subject-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-lg); }
.subject-card.chinese:hover { border-color:var(--pri); }
.subject-card.math:hover { border-color:var(--blu); }
.subject-card .sj-emoji { font-size:44px; display:block; margin-bottom:8px; }
.subject-card .sj-name { font-weight:700; font-size:1.1em; margin-bottom:4px; }
.subject-card .sj-count { font-size:.75em; color:var(--text2); }
.subject-card .sj-badge { position:absolute; top:8px; right:8px; background:var(--ylw); color:#fff;
  font-size:.65em; padding:3px 8px; border-radius:10px; font-weight:700; }

/* ===== Timer Settings ===== */
.timer-settings { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:12px 0; }
.timer-chip { padding:8px 14px; border-radius:20px; border:2px solid rgba(0,0,0,.06); background:var(--bg2);
  cursor:pointer; font-size:.8em; font-weight:600; transition:all .3s; font-family:var(--font); }
.timer-chip:hover { border-color:var(--pri); }
.timer-chip.active { background:var(--pri); color:#fff; border-color:var(--pri); }

/* ===== Exercise Screen ===== */
.ex-topbar { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.ex-back { width:40px; height:40px; border-radius:50%; background:var(--bg2); border:none; cursor:pointer;
  font-size:18px; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); color:var(--text); }
.ex-info { flex:1; }
.ex-info-title { font-weight:700; font-size:.95em; }
.ex-info-sub { font-size:.75em; color:var(--text2); }
.ex-timer { display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:20px;
  font-weight:700; font-size:.9em; background:var(--bg2); box-shadow:var(--shadow); }
.ex-timer.warning { background:#fff3cd; color:#e17055; animation:countPulse .6s ease-in-out infinite; }
.ex-timer.danger { background:#ffe0e0; color:#d63031; animation:countPulse .4s ease-in-out infinite; }

/* Progress dots */
.progress-dots { display:flex; gap:8px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
.dot { width:12px; height:12px; border-radius:50%; background:var(--text3); transition:all .3s; }
.dot.done { background:var(--grn); transform:scale(1.2); }
.dot.wrong-dot { background:var(--pri); }
.dot.current { background:var(--pri); animation:pulse 1s ease-in-out infinite; box-shadow:0 0 8px var(--pri); }

/* Question Card */
.q-card { background:var(--bg2); border-radius:var(--radius-lg); padding:24px; box-shadow:var(--shadow-lg);
  margin-bottom:14px; border:1px solid rgba(0,0,0,.04); }
.q-num { font-size:.8em; color:var(--pri); font-weight:700; margin-bottom:6px; }
.q-text { font-size:1.1em; line-height:1.8; margin-bottom:20px; color:var(--text); }
.q-text .blank { display:inline-block; min-width:56px; border-bottom:2px dashed var(--pri);
  text-align:center; padding:2px 6px; margin:0 4px; color:var(--pri2); font-weight:700; }
.q-text .pinyin-tag { color:var(--text2); font-size:.85em; }

/* Options */
.q-options { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.q-opt { background:#f8f9ff; border:2px solid #e8ecf8; border-radius:var(--radius-sm); padding:14px 16px;
  cursor:pointer; font-size:1em; color:var(--text); transition:all .2s; text-align:center;
  font-family:var(--font); position:relative; }
.q-opt:hover { border-color:var(--pri); background:#fff; transform:scale(1.02); }
.q-opt.correct { border-color:var(--grn); background:var(--grn-lt); color:#1e7e34; }
.q-opt.wrong { border-color:var(--pri); background:var(--pri-lt); color:#c0392b; animation:shake .4s; }
.q-opt:disabled { pointer-events:none; }
.q-opt .opt-letter { position:absolute; top:4px; left:8px; font-size:.65em; color:var(--text3); }

/* Input */
.q-input { width:100%; padding:14px 16px; background:#f8f9ff; border:2px solid #e8ecf8;
  border-radius:var(--radius-sm); font-size:1.05em; font-family:var(--font); color:var(--text);
  outline:none; transition:all .3s; }
.q-input:focus { border-color:var(--pri); background:#fff; }
.q-input.correct { border-color:var(--grn); background:var(--grn-lt); }
.q-input.wrong { border-color:var(--pri); background:var(--pri-lt); }

/* Buttons */
.btn { padding:12px 24px; border-radius:25px; border:none; cursor:pointer; font-size:.95em;
  font-weight:700; font-family:var(--font); transition:all .3s; display:inline-flex; align-items:center; gap:6px; }
.btn-full { width:100%; justify-content:center; padding:14px; font-size:1.05em; }
.btn-primary { background:linear-gradient(135deg, var(--pri), var(--pri2)); color:#fff;
  box-shadow:0 4px 16px rgba(255,107,107,.3); }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(255,107,107,.4); }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.btn-outline { background:transparent; border:2px solid var(--pri); color:var(--pri); }
.btn-green { background:linear-gradient(135deg, var(--grn), #26de81); color:#fff;
  box-shadow:0 4px 16px rgba(107,203,119,.3); }
.btn-white { background:var(--bg2); color:var(--text); box-shadow:var(--shadow); }

/* ===== Test Mode ===== */
.test-intro { text-align:center; padding:20px; }
.test-intro-icon { font-size:64px; animation:float 3s ease-in-out infinite; }
.test-intro h2 { font-size:1.4em; margin:8px 0; }
.test-intro .test-meta { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin:16px 0; }
.test-meta-item { background:var(--bg2); padding:12px 16px; border-radius:var(--radius-sm);
  box-shadow:var(--shadow); text-align:center; }
.test-meta-item .val { font-size:1.3em; font-weight:800; color:var(--pri); }
.test-meta-item .lbl { font-size:.75em; color:var(--text2); }
.test-timer-big { font-size:3em; font-weight:900; color:var(--pri); margin:16px 0; font-variant-numeric:tabular-nums; }
.test-timer-big.warning { color:#e17055; animation:countPulse .6s ease-in-out infinite; }
.test-timer-big.danger { color:#d63031; animation:countPulse .4s ease-in-out infinite; }

/* Test question list */
.test-q-item { background:var(--bg2); border-radius:var(--radius); padding:18px; margin-bottom:10px;
  box-shadow:var(--shadow); border-left:4px solid #e8ecf8; transition:all .3s; }
.test-q-item.answered { border-left-color:var(--blu); }
.test-q-item .tq-num { font-size:.75em; color:var(--text2); font-weight:700; }
.test-q-item .tq-text { font-weight:600; margin:6px 0 12px; }
.test-q-options { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.test-q-opt { padding:10px 14px; border-radius:8px; border:2px solid #e8ecf8; background:#f8f9ff;
  cursor:pointer; font-size:.9em; transition:all .15s; text-align:center; font-family:var(--font); }
.test-q-opt.selected { border-color:var(--blu); background:var(--blu-lt); color:var(--blu); }
.test-q-input { width:100%; padding:10px 14px; border:2px solid #e8ecf8; border-radius:8px;
  font-size:.9em; font-family:var(--font); background:#f8f9ff; outline:none; }
.test-q-input:focus { border-color:var(--blu); }

/* ===== Results Overlay ===== */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100;
  display:flex; align-items:center; justify-content:center; animation:fadeUp .3s; }
.result-panel { background:#fff; border-radius:var(--radius-lg); padding:28px; text-align:center;
  max-width:440px; width:92%; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2); animation:popBounce .5s; }
.result-emoji { font-size:64px; display:inline-block; animation:float 2s ease-in-out infinite; }
.result-grade { font-size:1.1em; color:var(--text2); margin:8px 0; }
.result-avatar { width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg, var(--pri), var(--ylw));
  display:inline-flex; align-items:center; justify-content:center; font-size:28px; margin:8px; }
.result-score-big { font-size:3.5em; font-weight:900; margin:4px 0;
  background:linear-gradient(135deg, var(--pri), var(--ylw)); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text; }
.result-stars-row { font-size:28px; letter-spacing:6px; margin:8px 0; }
.result-stars-row .star { display:inline-block; opacity:0; }
.result-stars-row .star.show { opacity:1; animation:popBounce .4s forwards; }
.result-msg { font-size:1.1em; color:var(--text2); margin:8px 0; font-weight:600; }
.result-detail { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:16px 0; }
.result-stat { text-align:center; padding:10px; background:#f8f9ff; border-radius:var(--radius-sm); }
.result-stat .r-val { font-size:1.3em; font-weight:800; color:var(--pri); }
.result-stat .r-lbl { font-size:.7em; color:var(--text2); }

/* ===== Badges ===== */
.badge-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.badge-item { text-align:center; padding:12px 8px; background:var(--bg2); border-radius:var(--radius);
  box-shadow:var(--shadow); transition:all .3s; }
.badge-item.earned { border:2px solid var(--ylw); }
.badge-item.locked { opacity:.4; filter:grayscale(.8); }
.badge-emoji { font-size:32px; }
.badge-name { font-size:.7em; margin-top:4px; font-weight:600; }
.badge-desc { font-size:.65em; color:var(--text2); }

/* ===== Particles ===== */
.particle { position:fixed; pointer-events:none; z-index:150; font-size:24px; animation:rise 1.2s ease-out forwards; }
.confetti-piece { position:fixed; pointer-events:none; z-index:200; width:10px; height:10px; border-radius:2px; 
  animation:confettiDrop var(--d) linear forwards; }

/* ===== Settings Row ===== */
.settings-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
.setting-label { font-size:.8em; color:var(--text2); font-weight:600; }
.version-chip { padding:6px 14px; border-radius:16px; border:2px solid rgba(0,0,0,.06); background:var(--bg2);
  cursor:pointer; font-size:.78em; font-weight:600; transition:all .3s; }
.version-chip:hover { border-color:var(--ppl); }
.version-chip.active { background:var(--ppl); color:#fff; border-color:var(--ppl); }

/* Toast */
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#2d3436; color:#fff;
  padding:10px 24px; border-radius:24px; font-size:.85em; font-weight:600; z-index:300;
  animation:slideIn .3s ease, fadeOut .3s ease 1.7s forwards; box-shadow:0 8px 24px rgba(0,0,0,.2); }
@keyframes fadeOut { to { opacity:0; transform:translateX(-50%) translateY(-10px); } }

/* Responsive */
@media (max-width:500px) {
  .q-options { grid-template-columns:1fr; }
  .test-q-options { grid-template-columns:1fr; }
  .result-detail { grid-template-columns:1fr 1fr 1fr; }
  .badge-grid { grid-template-columns:repeat(3,1fr); }
  .app-header { padding:16px; }
  .app-mascot { font-size:36px; }
  .app-greeting h1 { font-size:1.2em; }
}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-shape"></div><div class="bg-shape"></div><div class="bg-shape"></div><div class="bg-shape"></div></div>

<!-- ===== WELCOME SCREEN ===== -->
<div class="screen active" id="screen-welcome">
  <div class="container">
    <div class="app-header">
      <div class="app-header-top">
        <span class="app-mascot" id="welcome-mascot">🚀</span>
        <div class="app-greeting">
          <h1>趣味练习乐园</h1>
          <p>每天进步一点点，快乐学习每一天！</p>
        </div>
      </div>
      <div class="app-stats-mini">
        <div class="mini-stat"><div class="val" id="w-streak">0</div><div class="lbl">🔥 连续天数</div></div>
        <div class="mini-stat"><div class="val" id="w-stars">0</div><div class="lbl">⭐ 总星星</div></div>
        <div class="mini-stat"><div class="val" id="w-level">Lv.1</div><div class="lbl">🏆 等级</div></div>
        <div class="mini-stat"><div class="val" id="w-badges">0</div><div class="lbl">🏅 徽章</div></div>
      </div>
    </div>

    <!-- Grade Selector -->
    <p style="font-weight:700;font-size:.85em;color:var(--text2);margin-bottom:4px;">📚 选择年级</p>
    <div class="grade-ribbon" id="grade-ribbon"></div>

    <!-- Textbook Version -->
    <div class="settings-row">
      <span class="setting-label">📖 教材版本：</span>
      <button class="version-chip active" data-ver="pep">人教版</button>
      <button class="version-chip" data-ver="bnu">北师大版</button>
      <button class="version-chip" data-ver="sue">苏教版</button>
      <button class="version-chip" data-ver="common">通用版</button>
    </div>

    <!-- Mode Toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="practice">
        <span class="mode-icon">🎯</span>练习模式
      </button>
      <button class="mode-btn" data-mode="test">
        <span class="mode-icon">📝</span>测验模式
      </button>
    </div>

    <!-- Timer Setting (Practice Mode) -->
    <div class="card" id="timer-card">
      <div class="card-header"><span class="card-icon ylw">⏱️</span><span class="card-title">练习时长</span></div>
      <div class="timer-settings">
        <button class="timer-chip active" data-time="0">不限时</button>
        <button class="timer-chip" data-time="5">5分钟</button>
        <button class="timer-chip" data-time="10">10分钟</button>
        <button class="timer-chip" data-time="15">15分钟</button>
        <button class="timer-chip" data-time="20">20分钟</button>
      </div>
    </div>

    <!-- Subject Cards -->
    <p style="font-weight:700;font-size:.85em;color:var(--text2);margin-bottom:6px;">🎮 选择科目开始吧！</p>
    <div class="subject-grid">

function renderWelcome() {
  // Grade ribbon
  const ribbon = $('grade-ribbon');
  ribbon.innerHTML = GRADES.map(g => {
    const active = S.grade === g.id ? ' active' : '';
    return `<button class="grade-chip${active}" data-grade="${g.id}" onclick="selectGrade('${g.id}')">
      <span class="grade-emoji">${g.emoji}</span>${g.name}
    </button>`;
  }).join('');

  // Version chips
  document.querySelectorAll('.version-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.ver === S.version);
  });
  
  // Semester toggle
  const g = GRADES.find(g => g.id === S.grade);
  
  // Update mascot
  $('welcome-mascot').textContent = g ? g.emoji : '🚀';
  
  // Update subject descriptions

  $('chinese-count').textContent = `${gradeInfo} · 识字·阅读·古诗`;
  $('math-count').textContent = `${gradeInfo} · 计算·图形·应用`;
  
  updateStats();
}

function selectGrade(gid) {
  S.grade = gid;
  saveState();
  renderWelcome();
}

function updateStats() {
  $('w-streak').textContent = S.streak;
  $('w-stars').textContent = S.totalStars;
  const lv = getLevel(S.xp);
  $('w-level').textContent = 'Lv.' + lv.lv;
  $('w-badges').textContent = S.badges.length;
}

function updateStreak() {
  const today = new Date().toLocaleDateString('zh-CN');
  if (S.lastDate === today) return;
  const yest = new Date(Date.now()-86400000).toLocaleDateString('zh-CN');
  if (S.lastDate === yest) S.streak++;
  else if (S.lastDate !== today) S.streak = 1;
  S.lastDate = today;
  saveState();
}

// PRACTICE MODE
// ═══════════════════════════════════════════
function startPractice(subject) {
  currentSubject = subject;
  currentMode = 'practice';
  updateStreak();
  
  // Get exercises for current grade + subject, filtered by version
  let pool = EXERCISES[S.grade]?.[subject] || EXERCISES['2'][subject];
  pool = pool.filter(e => e.tags.includes(S.version) || e.tags.includes('common'));
  exerciseList = shuffle([...pool]).slice(0, 10);
  exerciseIndex = 0;
  score = 0;
  timerSeconds = currentTimer * 60;
  
  const g = GRADES.find(g => g.id === S.grade);
  const subjName = subject === 'chinese' ? '语文' : '数学';
  $('practice-title').textContent = `${g ? g.emoji : ''} ${g ? g.name : ''}${subjName}练习`;
  $('practice-sub').textContent = `${VERSIONS[S.version] || '通用版'} · ${exerciseList.length}题`;
  
  // Progress dots
  let dotsHTML = '';
  for (let i = 0; i < exerciseList.length; i++) dotsHTML += '<div class="dot"></div>';
  $('progress-dots').innerHTML = dotsHTML;
  
  // Timer
  if (currentTimer > 0) {
    $('practice-timer').textContent = '⏱️ ' + formatTime(timerSeconds);
    startTimer('practice');
  } else {
    $('practice-timer').textContent = '⏱️ 计时中';
    timerSeconds = 0;
    startTimer('practice');
  }
  
  showScreen('screen-practice');
  renderPracticeQuestion();
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function startTimer(screen) {
  stopTimer();
  timerInterval = setInterval(() => {
    if (screen === 'test') {
      timerSeconds--;
      updateTestTimer();
      if (timerSeconds <= 0) { submitTest(); return; }
    } else {
      if (currentTimer > 0) {
        timerSeconds--;
        updatePracticeTimer();
        if (timerSeconds <= 0) { finishPractice(); return; }
      } else {
        timerSeconds++;
        updatePracticeTimer();
      }
    }
  }, 1000);
}

function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

function updatePracticeTimer() {
  const el = $('practice-timer');
  el.textContent = '⏱️ ' + formatTime(Math.abs(timerSeconds));
  if (currentTimer > 0 && timerSeconds <= 30) {
    el.classList.add('warning');
    if (timerSeconds <= 10) el.classList.add('danger');
  }
}

function renderPracticeQuestion() {
  if (exerciseIndex >= exerciseList.length) { finishPractice(); return; }
  const q = exerciseList[exerciseIndex];
  
  // Update dots
  const dots = $('progress-dots').children;
  for (let i = 0; i < dots.length; i++) {
    dots[i].className = 'dot';
    if (i < exerciseIndex && answers[i] === true) dots[i].classList.add('done');
    else if (i < exerciseIndex) dots[i].classList.add('wrong-dot');
    if (i === exerciseIndex) dots[i].classList.add('current');
  }
  
  let html = `<div class="q-card">
    <div class="q-num">第 ${exerciseIndex+1} / ${exerciseList.length} 题</div>
    <div class="q-text">${q.q}</div>`;
  
  if (q.type === 'choice') {
    html += '<div class="q-options">';
    const letters = ['A','B','C','D'];
    q.opts.forEach((o, i) => {
      html += `<button class="q-opt" onclick="answerPracticeChoice(this,${i})"><span class="opt-letter">${letters[i]}</span>${o}</button>`;
    });
    html += '</div>';
  } else if (q.type === 'pinyin') {
    html += `<input class="q-input" id="prac-input" type="text" placeholder="请输入答案..." autocomplete="off">
      <button class="btn btn-primary btn-full" style="margin-top:12px" onclick="answerPracticeInput()">✅ 确认</button>`;
  } else if (q.type === 'fill') {
    q.blanks.forEach((_, i) => {
      html = html.replace('<span class="blank"></span>',
        `<input class="q-input" id="fill-${i}" style="display:inline-block;width:60px;margin:0 4px;padding:8px 4px;text-align:center" autocomplete="off">`);
    });
    html += `<button class="btn btn-primary btn-full" style="margin-top:12px" onclick="answerPracticeFill()">✅ 确认</button>`;
  }
  
  html += '</div>';
  $('practice-content').innerHTML = html;
  
  // Auto-focus
  setTimeout(() => {
    const inp = document.querySelector('#prac-input') || document.querySelector('#fill-0');
    if (inp) inp.focus();
  }, 100);
}

function answerPracticeChoice(btn, idx) {
  const q = exerciseList[exerciseIndex];
  const correct = idx === q.ans;
  
  document.querySelectorAll('.q-opt').forEach(b => b.disabled = true);
  if (correct) { btn.classList.add('correct'); score++; } 
  else { btn.classList.add('wrong'); document.querySelectorAll('.q-opt')[q.ans].classList.add('correct'); }
  
  answers[exerciseIndex] = correct;
  spawnParticles(btn, correct);
  
  setTimeout(() => { exerciseIndex++; renderPracticeQuestion(); }, 1000);
}

function answerPracticeInput() {
  const inp = $('prac-input');
  if (!inp || !inp.value.trim()) { inp?.focus(); return; }
  const q = exerciseList[exerciseIndex];
  const userAns = inp.value.trim().replace(/[，,、\s]/g,'');
  const correctAns = q.ans.replace(/[，,、\s]/g,'');
  const correct = userAns === correctAns;
  
  if (correct) { inp.classList.add('correct'); score++; }
  else { inp.classList.add('wrong'); showCorrectAnswer(inp, q.ans); }
  inp.disabled = true;
  answers[exerciseIndex] = correct;
  spawnParticles(inp, correct);
  
  // Disable button
  const btn = document.querySelector('#practice-content .btn-primary');
  if (btn) btn.disabled = true;
  
  setTimeout(() => { exerciseIndex++; renderPracticeQuestion(); }, 1000);
}

function answerPracticeFill() {
  const q = exerciseList[exerciseIndex];
  const inputs = q.blanks.map((_, i) => $('fill-' + i));
  const allFilled = inputs.every(inp => inp && inp.value.trim());
  if (!allFilled) { inputs.find(i => !i?.value?.trim())?.focus(); return; }
  
  let allCorrect = true;
  inputs.forEach((inp, i) => {
    if (inp.value.trim() === q.blanks[i]) inp.classList.add('correct');
    else { inp.classList.add('wrong'); allCorrect = false; showCorrectAnswer(inp, q.blanks[i]); }
    inp.disabled = true;
  });
  if (allCorrect) score++;
  answers[exerciseIndex] = allCorrect;
  spawnParticles(document.querySelector('.q-card'), allCorrect);
  
  const btn = document.querySelector('#practice-content .btn-primary');
  if (btn) btn.disabled = true;
  
  setTimeout(() => { exerciseIndex++; renderPracticeQuestion(); }, 1000);
}

function showCorrectAnswer(el, ans) {
  const hint = document.createElement('span');
  hint.style.cssText = 'color:var(--pri);font-size:.8em;margin-left:6px;font-weight:700';
  hint.textContent = '(正确:' + ans + ')';
  el.parentElement.appendChild(hint);
}

function finishPractice() {
  stopTimer();
  const total = exerciseList.length;
  const pct = total > 0 ? Math.round(score / total * 100) : 0;
  const timeTaken = Math.abs(timerSeconds);
  
  // Update state
  S.totalStars += score;
  S.totalCorrect += score;
  S.totalDone += total;
  S.xp += score * 5 + (pct === 100 ? 20 : 0);
  if (currentTimer > 0 && timeTaken <= 300 && pct >= 80 && !S.badges.includes('speed')) S.badges.push('speed');
  if (pct === 100 && !S.badges.includes('perfect')) S.badges.push('perfect');
  
  // History
  if (!S.history) S.history = [];
  S.history.push({
    date: new Date().toISOString(), grade: S.grade, subject: currentSubject,
    mode: 'practice', score, total, pct, timeTaken: timerSeconds
  });
  
  saveState();
  checkBadges();
  showResultOverlay(pct, score, total, timeTaken, 'practice');
}

// ═══════════════════════════════════════════
// TEST MODE
// ═══════════════════════════════════════════
function showTestIntro(subject) {
  currentSubject = subject;
  currentMode = 'test';
  updateStreak();
  
  const g = GRADES.find(g => g.id === S.grade);
  const subjName = subject === 'chinese' ? '语文' : '数学';
  $('test-intro-title').textContent = `${g ? g.emoji : ''} ${g ? g.name : ''}${subjName}测验`;
  $('test-intro-desc').textContent = `${VERSIONS[S.version] || '通用版'} · 综合测验试卷`;
  
  // Prepare questions
  let pool = EXERCISES[S.grade]?.[subject] || EXERCISES['2'][subject];
  pool = pool.filter(e => e.tags.includes(S.version) || e.tags.includes('common'));
  exerciseList = shuffle([...pool]).slice(0, 12);
  const timeLimit = Math.max(5, Math.ceil(exerciseList.length * 1.2));
  timerSeconds = timeLimit * 60;
  
  $('test-intro-count').textContent = exerciseList.length;
  $('test-intro-time').textContent = timeLimit;
  $('test-intro-pass').textContent = '60';
  
  showScreen('screen-test-intro');
}

function startTest() {
  answers = new Array(exerciseList.length).fill(-1);
  const g = GRADES.find(g => g.id === S.grade);
  const subjName = currentSubject === 'chinese' ? '语文' : '数学';
  $('test-title').textContent = `${g ? g.emoji : ''} ${g ? g.name : ''}${subjName}测验`;
  $('test-sub').textContent = `${exerciseList.length}题 · ${VERSIONS[S.version]}`;
  
  updateTestTimer();
  startTimer('test');
  showScreen('screen-test');
  renderTestQuestions();
}

function updateTestTimer() {
  const el = $('test-timer');
  const big = $('test-timer-big');
  const t = formatTime(Math.max(0, timerSeconds));
  el.textContent = '⏱️ ' + t;
  big.textContent = t;
  el.classList.remove('warning', 'danger');
  big.classList.remove('warning', 'danger');
  if (timerSeconds <= 60) { el.classList.add('warning'); big.classList.add('warning'); }
  if (timerSeconds <= 15) { el.classList.add('danger'); big.classList.add('danger'); }
}

function renderTestQuestions() {
  let html = '';
  exerciseList.forEach((q, i) => {
    html += `<div class="test-q-item" id="tq-${i}">
      <div class="tq-num">第 ${i+1} 题</div>
      <div class="tq-text">${q.q}</div>`;
    
    if (q.type === 'choice') {
      html += '<div class="test-q-options">';
      q.opts.forEach((o, j) => {
        html += `<button class="test-q-opt" id="tqo-${i}-${j}" onclick="answerTestChoice(${i},${j})">${o}</button>`;
      });
      html += '</div>';
    } else if (q.type === 'pinyin') {
      html += `<input class="test-q-input" id="tqi-${i}" type="text" placeholder="请输入答案..." onchange="answerTestInput(${i})" autocomplete="off">`;
    } else if (q.type === 'fill') {
      let fillHtml = q.q;
      q.blanks.forEach((_, bi) => {
        fillHtml = fillHtml.replace('<span class="blank"></span>',
          `<input class="test-q-input" id="tqf-${i}-${bi}" style="display:inline-block;width:60px;margin:0 4px;padding:6px 4px;text-align:center" onchange="answerTestFill(${i})" autocomplete="off">`);
      });
      html += fillHtml;
    }
    
    html += '</div>';
  });
  $('test-content').innerHTML = html;
}

function answerTestChoice(qi, oi) {
  const q = exerciseList[qi];
  answers[qi] = oi === q.ans;
  // Update UI
  document.querySelectorAll(`#tq-${qi} .test-q-opt`).forEach(b => b.classList.remove('selected'));
  document.getElementById(`tqo-${qi}-${oi}`).classList.add('selected');
  document.getElementById(`tq-${qi}`).classList.add('answered');
}

function answerTestInput(qi) {
  const q = exerciseList[qi];
  let correct;
  if (q.type === 'pinyin') {
    const inp = document.getElementById(`tqi-${qi}`);
    if (!inp) return;
    const userAns = inp.value.trim().replace(/[，,、\s]/g,'');
    const correctAns = q.ans.replace(/[，,、\s]/g,'');
    correct = userAns === correctAns;
  }
  answers[qi] = correct;
  document.getElementById(`tq-${qi}`).classList.add('answered');
}

function answerTestFill(qi) {
  const q = exerciseList[qi];
  let allCorrect = true;
  q.blanks.forEach((b, bi) => {
    const inp = document.getElementById(`tqf-${qi}-${bi}`);
    if (inp && inp.value.trim() !== b) allCorrect = false;
  });
  answers[qi] = allCorrect;
  document.getElementById(`tq-${qi}`).classList.add('answered');
}

function submitTest() {
  stopTimer();
  // Score calculation
  score = answers.filter(a => a === true).length;
  const total = exerciseList.length;
  const pct = Math.round(score / total * 100);
  const timeTaken = Math.abs(timerSeconds);
  
  // Update state
  S.totalStars += Math.round(score / 2);
  S.totalCorrect += score;
  S.totalDone += total;
  S.xp += score * 5 + (pct >= 90 ? 30 : pct >= 60 ? 15 : 0);
  if (pct === 100 && !S.badges.includes('perfect')) S.badges.push('perfect');
  
  if (!S.history) S.history = [];
  S.history.push({
    date: new Date().toISOString(), grade: S.grade, subject: currentSubject,
    mode: 'test', score, total, pct, timeTaken
  });
  
  saveState();
  checkBadges();
  showResultOverlay(pct, score, total, timeTaken, 'test');
}

function confirmQuitTest() {
  const answeredCount = answers.filter(a => a !== -1 && a !== undefined).length;
  if (answeredCount > 0) {
    if (!confirm(`你已经回答了${answeredCount}道题，确定要退出吗？已答的题目不会保存。`)) return;
  }
  stopTimer();
  goHome();
}

// ═══════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════
function showResultOverlay(pct, _score, total, timeTaken, mode) {
  let emoji, msg;
  if (pct === 100) { emoji = '🎉'; msg = '满分！太厉害了！'; }
  else if (pct >= 90) { emoji = '🌟'; msg = '非常棒！接近完美！'; }
  else if (pct >= 75) { emoji = '👍'; msg = '优秀！继续保持！'; }
  else if (pct >= 60) { emoji = '😊'; msg = '不错，再加把劲！'; }
  else if (pct >= 40) { emoji = '💪'; msg = '加油哦，再练练！'; }
  else { emoji = '🤗'; msg = '没关系，多练习就会进步！'; }
  
  const grade = pct >= 90 ? 'A+' : pct >= 80 ? 'A' : pct >= 70 ? 'B' : pct >= 60 ? 'C' : 'D';
  
  // Stars
  const starsEarned = Math.round(pct / 20); // max 5 stars
  let starsHTML = '';
  for (let i = 0; i < 5; i++) starsHTML += `<span class="star" style="${i < starsEarned ? '' : 'filter:grayscale(1);opacity:.3'}">⭐</span>`;
  
  const html = `
    <div class="result-panel">
      <div class="result-emoji">${emoji}</div>
      <div class="result-grade">成绩等级：<b style="font-size:1.2em;color:var(--pri)">${grade}</b></div>
      <div class="result-score-big">${pct}%</div>
      <div class="result-stars-row">${starsHTML}</div>
      <div class="result-msg">${msg}</div>
      <div class="result-detail">
        <div class="result-stat"><div class="r-val">${_score}/${total}</div><div class="r-lbl">正确/总数</div></div>
        <div class="result-stat"><div class="r-val">${formatTime(Math.abs(timeTaken))}</div><div class="r-lbl">用时</div></div>
        <div class="result-stat"><div class="r-val">+${_score*5+(pct===100?20:0)}</div><div class="r-lbl">获得XP</div></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px">
        <button class="btn btn-primary" onclick="closeResult();${mode==='test'?'startTest()':'startPractice(currentSubject)'}">🔄 再来一次</button>
        <button class="btn btn-outline" onclick="closeResult();goHome();">🏠 返回</button>
      </div>
    </div>`;
  
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'result-overlay';
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
  
  // Animate stars
  setTimeout(() => {
    overlay.querySelectorAll('.star').forEach((s, i) => {
      setTimeout(() => s.classList.add('show'), i * 200);
    });
  }, 300);
  
  if (pct >= 60) spawnConfetti();
}

function closeResult() {
  const overlay = document.getElementById('result-overlay');
  if (overlay) overlay.remove();
}

// ═══════════════════════════════════════════
// BADGES SCREEN
// ═══════════════════════════════════════════
function showBadges() {
  showScreen('screen-badges');
  $('badge-grid').innerHTML = BADGES.map(b => {
    const earned = S.badges.includes(b.id);
    return `<div class="badge-item ${earned ? 'earned' : 'locked'}">
      <div class="badge-emoji">${b.emoji}</div>
      <div class="badge-name">${b.name}</div>
      <div class="badge-desc">${earned ? '已获得' : b.desc}</div>
    </div>`;
  }).join('');
}

function checkBadges() {
  const newB = [];
  BADGES.forEach(b => {
    if (!S.badges.includes(b.id) && b.check()) {
      S.badges.push(b.id);
      newB.push(b);
    }
  });
  if (newB.length) {
    saveState();
    toast('🎊 获得新徽章：' + newB.map(b => b.name).join('、'));
  }
  return newB;
}

// ═══════════════════════════════════════════
// HISTORY SCREEN
// ═══════════════════════════════════════════
function showHistory() {
  showScreen('screen-history');
  const h = S.history || [];
  if (h.length === 0) {
    $('history-content').innerHTML = '<p style="text-align:center;color:var(--text2);padding:20px">还没有学习记录，快去练习吧！🚀</p>';
    return;
  }
  let html = '<div style="max-height:400px;overflow-y:auto">';
  [...h].reverse().slice(0, 30).forEach(r => {
    const d = new Date(r.date);
    const dateStr = d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
    const subjEmoji = r.subject === 'chinese' ? '📖' : '🧮';
    const modeTag = r.mode === 'test' ? '📝测验' : '🎯练习';
    const gradeObj = GRADES.find(g => g.id === r.grade);
    html += `<div style="padding:10px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px">
      <span style="font-size:24px">${subjEmoji}</span>
      <div style="flex:1"><b>${gradeObj?gradeObj.name:''}${r.subject==='chinese'?'语文':'数学'} ${modeTag}</b>
      <div style="font-size:.75em;color:var(--text2)">${dateStr}</div></div>
      <div style="text-align:right"><span style="font-weight:800;color:var(--pri);font-size:1.1em">${r.pct}%</span>
      <div style="font-size:.7em;color:var(--text2)">${r.score}/${r.total}</div></div>
    </div>`;
  });
  html += '</div>';
  $('history-content').innerHTML = html;
}

// ═══════════════════════════════════════════
// EFFECTS
// ═══════════════════════════════════════════
function spawnParticles(el, correct) {
  if (!el) return;
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  const emojis = correct ? ['⭐','✨','💫','🌟'] : ['💨'];
  for (let i = 0; i < (correct ? 6 : 2); i++) {
    const p = document.createElement('span');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    p.style.cssText = `left:${cx+(Math.random()-.5)*100}px;top:${cy}px;animation-delay:${Math.random()*.3}s;font-size:${14+Math.random()*14}px`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

function spawnConfetti() {
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#9b59b6','#ff8e53','#00b894','#fd79a8'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}%;top:${-20-Math.random()*40}px;background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${5+Math.random()*10}px;height:${5+Math.random()*10}px;--d:${2+Math.random()*3}s;animation-delay:${Math.random()*2}s`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 5000);
  }
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function goHome() {
  stopTimer();
  closeResult();
  showScreen('screen-welcome');
  renderWelcome();
  updateStats();
}

function resetAll() {
  if (confirm('确定要清除所有学习记录和进度吗？此操作不可恢复！')) {
    localStorage.removeItem(KEY);
    S = defaultState();
    renderWelcome();
    toast('🔄 已重置所有进度');
  }
}

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const inp = document.getElementById('prac-input');
    if (inp && document.activeElement === inp) answerPracticeInput();
  }
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderWelcome();

// Re-bind subject cards for current mode
document.querySelectorAll('.subject-card').forEach(c => {
  c.onclick = function() {
    const subj = c.classList.contains('chinese') ? 'chinese' : 'math';
    if (currentMode === 'practice') startPractice(subj);
    else showTestIntro(subj);
  };
});
</script>
</body>
</html>
